name: Coverage

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # GPU/window-bound files require a live wgpu device + winit surface, which the
  # headless CI runner has no way to create, so they can't be unit-tested and are
  # excluded from the coverage measurement. Everything device-free (scene/cell
  # text building, the terminal model, the broker) IS tested and measured.
  COV_IGNORE: '(gpu|renderer|cellgrid|textprep|quads|roundborder)\.rs$'

jobs:
  llvm-cov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate scoped coverage summary
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov -p crew-term -p crew-render -p crew-plugin --all-features \
            --ignore-filename-regex "$COV_IGNORE" \
            --summary-only | tee coverage-summary.txt

      - name: Enforce line coverage >= 80%
        run: |
          LINE_COVER=$(awk '/^TOTAL/{gsub("%","",$10); print $10}' coverage-summary.txt)
          echo "Line coverage: ${LINE_COVER}%"
          awk -v v="$LINE_COVER" 'BEGIN { exit (v >= 80.0) ? 0 : 1 }'

      - name: Generate scoped coverage (lcov)
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov -p crew-term -p crew-render -p crew-plugin --all-features \
            --ignore-filename-regex "$COV_IGNORE" \
            --lcov --output-path lcov.info

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info

      - name: Upload coverage summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.txt

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
